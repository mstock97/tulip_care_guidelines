<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Delivery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="glass-card">
        <header class="fade-in">
            <p class="pre-title">EXCLUSIVE NOTIFICATION</p>
            <h1 id="greeting">A Surprise Awaits You</h1>
            <div class="divider"></div>
        </header>

        <section class="content fade-in-delayed">
            <p>We’ve prepared something special just for you. You will be redirected to your gift details momentarily.</p>
            
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p class="timer-text">Redirecting in <span id="countdown">10</span>s</p>
        </section>

        <footer class="button-group fade-in-delayed">
            <button id="redirect-now" class="btn btn-primary">Open Invitation Now</button>
            <button id="stop-timer" class="btn btn-outline">Pause to Enjoy the View</button>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
