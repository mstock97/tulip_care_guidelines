<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Special Gift 🌷</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    :root {
      --bg:          #fffbf0;
      --heading:     #7a4500;
      --text:        #3d2b1f;
      --text-muted:  #a08060;
      --accent:      #f59e0b;
      --accent-text: #1a0e00;
      --card-bg:     #ffffff;
      --card-border: #fde8b0;
    }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 0%, #fef3c7 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, #fde68a 0%, transparent 55%);
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .landing {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .landing .big-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
    }
    .landing h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 7vw, 3rem);
      color: var(--heading);
      margin-bottom: 16px;
    }
    .landing p {
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      color: var(--text-muted);
      font-weight: 600;
      line-height: 1.6;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="petal-bg"></div>
  <div class="landing">
    <span class="big-emoji">🌷</span>
    <h1>You've found<br>a <em>secret garden!</em></h1>
    <p>This page is a private gift — if you received a special link, head there to see your surprise! 💌</p>
  </div>
  <script src="js/petals.js"></script>
</body>
</html>
