<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tulip Care Guide 🌷</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    :root {
      --bg:          #f5fff8;
      --heading:     #1a6b3a;
      --text:        #183022;
      --text-muted:  #5a9870;
      --accent:      #2db560;
      --accent-text: #fff;
      --card-bg:     #ffffff;
      --card-border: #b8e8cc;
    }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 10% 0%, #d0f5e0 0%, transparent 55%),
        radial-gradient(ellipse at 90% 100%, #c8f2d8 0%, transparent 55%);
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .coming-soon {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 60px 24px;
    }
    .coming-soon .big-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 20px;
      animation: bounceIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes bounceIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .coming-soon h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 7vw, 3.5rem);
      color: var(--heading);
      margin-bottom: 16px;
    }
    .coming-soon p {
      font-family: 'Nunito', sans-serif;
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 600;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="petal-bg"></div>
  <div class="coming-soon">
    <span class="big-emoji">🌱</span>
    <h1>Care Guide<br><em>Coming Soon!</em></h1>
    <p>We're putting together the perfect tulip care guide for you. Check back soon — everything you need to grow a beautiful garden will be right here!</p>
  </div>
  <script src="../js/petals.js"></script>
</body>
</html>
